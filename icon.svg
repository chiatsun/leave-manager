<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD200" />
      <stop offset="100%" stop-color="#F7971E" />
    </linearGradient>
    <!-- Glow and Shadow Filters -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.15" />
    </filter>
    <filter id="iconGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#F7971E" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Base App Icon Card (Rounded Rectangle) -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bgGrad)" filter="url(#dropShadow)" />

  <!-- Inner Sun/Glow (Soft warm background light) -->
  <circle cx="380" cy="130" r="60" fill="#FFFFFF" opacity="0.2" />

  <!-- Premium Minimalist Vacation Suitcase & Airplane Symbol -->
  <g fill="none" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#iconGlow)">
    <!-- Suitcase Body -->
    <rect x="146" y="180" width="220" height="190" rx="24" />
    <!-- Suitcase Handle -->
    <path d="M210 180 V130 A 10 10 0 0 1 220 120 H 292 A 10 10 0 0 1 302 130 V 180" />
    <!-- Suitcase Details/Straps -->
    <line x1="200" y1="180" x2="200" y2="370" opacity="0.7" stroke-width="12" />
    <line x1="312" y1="180" x2="312" y2="370" opacity="0.7" stroke-width="12" />
    <!-- Small wheels -->
    <circle cx="186" cy="385" r="15" fill="#FFFFFF" stroke="none" />
    <circle cx="326" cy="385" r="15" fill="#FFFFFF" stroke="none" />
    
    <!-- Airplane taking off -->
    <path d="M 330 150 L 375 140 L 360 110 L 380 105 L 405 135 L 430 130 C 440 128 440 138 430 142 L 405 150 L 390 180 L 370 175 L 375 155 Z" fill="#FFFFFF" stroke-width="2" />
    <!-- Flight trail -->
    <path d="M 280 190 Q 320 180 340 165" stroke-dasharray="10 10" stroke-width="8" opacity="0.8" />
  </g>
</svg>
